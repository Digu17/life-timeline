<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Timeline Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: radial-gradient(circle at top, #1e293b, #020617);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

/* Container */
.container {
  width: 95%;
  max-width: 500px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  transition: 0.3s;
}

.container:hover {
  transform: translateY(-5px);
}

h1 {
  text-align: center;
  margin-bottom: 5px;
}

.sub {
  text-align: center;
  opacity: 0.7;
  font-size: 14px;
}

/* Inputs */
input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 12px;
}

/* Button */
button {
  margin-top: 15px;
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(45deg, #6366f1, #8b5cf6);
  color: white;
  font-size: 16px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

button::after {
  content: "";
  position: absolute;
  width: 300%;
  height: 300%;
  top: -100%;
  left: -100%;
  background: rgba(255,255,255,0.1);
  transform: rotate(45deg);
  transition: 0.5s;
}

button:hover::after {
  top: 100%;
  left: 100%;
}

/* Cards */
.cards {
  display: flex;
  justify-content: space-between;
  margin-top: 20px;
}

.card {
  width: 32%;
  background: rgba(255,255,255,0.08);
  padding: 10px;
  border-radius: 10px;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.1);
}

/* Progress */
.progress-bar {
  margin-top: 20px;
  background: #334155;
  border-radius: 10px;
  overflow: hidden;
}

.progress-fill {
  height: 10px;
  width: 0%;
  background: linear-gradient(90deg, #22c55e, #4ade80);
  transition: 1s;
}

.text, .highlight, .extra {
  margin-top: 10px;
  text-align: center;
}

.highlight {
  color: #facc15;
  font-weight: bold;
}

/* Grid */
.grid {
  display: grid;
  grid-template-columns: repeat(50, 5px);
  gap: 2px;
  justify-content: center;
  margin-top: 20px;
}

.box {
  width: 5px;
  height: 5px;
  opacity: 0;
  transition: 0.3s;
}

.filled { background: #22c55e; }
.empty { background: #334155; }

</style>
</head>

<body>

<div class="container">
  <h1>⏳ Your Life Timeline</h1>
  <p class="sub">See your life in weeks & reality</p>

  <input type="date" id="dob">
  <input type="number" id="phone" placeholder="Daily phone usage (hours)">
  
  <button onclick="calculate()">See My Life</button>

  <div class="cards" id="cards"></div>

  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div class="text" id="progressText"></div>
  <div class="highlight" id="highlight"></div>
  <div class="extra" id="extra"></div>

  <div class="grid" id="grid"></div>
</div>

<script>
function calculate() {
  const dobValue = document.getElementById("dob").value;
  const phone = document.getElementById("phone").value || 0;

  if (!dobValue) return alert("Enter DOB");

  const dob = new Date(dobValue);
  const today = new Date();

  const diffTime = today - dob;
  const days = Math.floor(diffTime / (1000 * 60 * 60 * 24));
  const weeks = Math.floor(days / 7);
  const years = (days / 365).toFixed(1);

  const lifeExpectancy = 75 * 365;
  const percent = ((days / lifeExpectancy) * 100).toFixed(1);
  const daysLeft = Math.floor(lifeExpectancy - days);

  const phoneYears = ((phone * 365 * 75) / 24 / 365).toFixed(1);

  let phase = "";
  if (years < 18) phase = "🎓 Learning Phase";
  else if (years < 30) phase = "🚀 Growth Phase";
  else if (years < 50) phase = "🏗 Building Phase";
  else phase = "👑 Legacy Phase";

  document.getElementById("cards").innerHTML = `
    <div class="card">Days<br><b>${days}</b></div>
    <div class="card">Weeks<br><b>${weeks}</b></div>
    <div class="card">Age<br><b>${years}</b></div>
  `;

  document.getElementById("progressFill").style.width = percent + "%";

  document.getElementById("progressText").innerText =
    `🎬 Your life movie is ${percent}% completed`;

  document.getElementById("highlight").innerText =
    `🌅 You have ${daysLeft} mornings left`;

  document.getElementById("extra").innerHTML = `
    📱 You may waste <b>${phoneYears} years</b> on phone 😳 <br>
    🎯 You are in <b>${phase}</b>
  `;

  const totalWeeks = 75 * 52;
  let gridHTML = "";

  for (let i = 0; i < totalWeeks; i++) {
    gridHTML += `<div class="box ${i < weeks ? 'filled' : 'empty'}"></div>`;
  }

  document.getElementById("grid").innerHTML = gridHTML;

  // animation fill
  setTimeout(() => {
    document.querySelectorAll(".box").forEach((el, i) => {
      setTimeout(() => {
        el.style.opacity = "1";
      }, i * 1);
    });
  }, 100);
}
</script>

</body>
</html>
