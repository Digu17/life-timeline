<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Timeline</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins';}

body{
  background: radial-gradient(circle at top,#1e293b,#020617);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding: 40px 0;
}

.container{
  width:95%;
  max-width:420px;
  background:rgba(255,255,255,0.05);
  padding:25px;
  border-radius:20px;
  backdrop-filter:blur(20px);
  text-align:center;
}

/* Title */
.title{font-size:20px;font-weight:600;}

/* Progress */
.progress{display:flex;gap:5px;margin:15px 0;}
.progress div{
  flex:1;height:6px;background:#334155;border-radius:10px;
}
.progress .active{
  background:linear-gradient(90deg,#22c55e,#4ade80);
}

/* Steps */
.step{display:none;}
.step.active{display:block;animation:fade 0.4s ease;}

/* Modern Date Input */
.date-wrapper{
  position:relative;
  width:100%;
}

.date-wrapper input{
  width:100%;
  padding:12px 40px 12px 12px;
  border-radius:10px;
  border:none;
  appearance:none;
  text-transform: uppercase;
}

input[type="date"]::-webkit-calendar-picker-indicator{
  opacity:0;
  position:absolute;
  right:0;
}

.date-wrapper i {
    position: absolute;
    right: 15px;
    top: 29px;
    color: #94a3b8;
    font-size: 18px;
}

.date-wrapper:hover i{
  color:#22c55e;
}

/* Inputs */
input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-top:15px;
}

/* Buttons */
button{
  margin-top:12px;
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  background:linear-gradient(45deg,#6366f1,#8b5cf6);
  color:white;
  cursor:pointer;
}

.back{background:#334155;}

.result{
  margin-top:20px;
  line-height:1.8;
}

.highlight{color:#facc15;font-weight:bold;}
.danger{color:#ef4444;font-weight:bold;}

.cta{
  margin-top:15px;
  color:#22c55e;
  font-weight:bold;
}

/* SOCIAL ICONS */
.social-bar{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:20px;
}

.social{
  width:55px;
  height:55px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  cursor:pointer;
  position:relative;
  transition:0.3s;
}

.social::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  border-radius:50%;
  filter:blur(15px);
  opacity:0.6;
  z-index:-1;
}

.social:hover{
  transform:translateY(-6px) scale(1.1);
}

.fb{background:linear-gradient(145deg,#1e3a8a,#2563eb);}
.fb::before{background:#2563eb;}

.insta{
  background:radial-gradient(circle at 30% 30%,#feda75,#d62976,#962fbf);
}
.insta::before{background:#d62976;}

.twitter{
  background:linear-gradient(145deg,#0ea5e9,#38bdf8);
}
.twitter::before{background:#38bdf8;}

.whatsapp{background:#25D366;}
.whatsapp::before{background:#25D366;}

.telegram{background:#229ED9;}
.telegram::before{background:#229ED9;}

.social i{color:white;}

/* Grid */
.grid{
  display:grid;
  grid-template-columns:repeat(50,5px);
  gap:2px;
  justify-content:center;
  margin-top:20px;
}

.box{width:5px;height:5px;opacity:0;}
.filled{background:#22c55e;}
.empty{background:#334155;}

@keyframes fade{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container" id="capture">

<h2 id="mainTitle" class="title">
😳 See how much of your life is already gone
</h2>

<p style="opacity:0.7;">Enter your birth date and see your life in weeks</p>

<div class="progress">
  <div id="p1" class="active"></div>
  <div id="p2"></div>
  <div id="p3"></div>
</div>

<!-- STEP 1 -->
<div class="step active" id="step1">
  <div class="date-wrapper">
    <input type="date" id="dob" min="1900-01-01" max="2099-12-31">
    <i class="fa-solid fa-calendar-days"></i>
  </div>
  <button onclick="goStep2()">Next</button>
</div>

<!-- STEP 2 -->
<div class="step" id="step2">
  <input type="number" id="phone" placeholder="Daily phone usage (optional)">
  
  <button onclick="calculate()">See My Life</button>
  <button class="back" onclick="back1()">⬅ Back</button>
</div>

<!-- STEP 3 -->
<div class="step" id="step3">

  <div class="result" id="result"></div>

  <div class="cta">⚡ Start using your time wisely</div>

  <!-- SOCIAL -->
  <div class="social-bar">
    <div class="social fb"><i class="fa-brands fa-facebook-f"></i></div>
    <div class="social insta" onclick="shareInsta()"><i class="fa-brands fa-instagram"></i></div>
    <div class="social twitter" onclick="shareTwitter()"><i class="fa-brands fa-x-twitter"></i></div>
    <div class="social whatsapp" onclick="shareWhatsApp()"><i class="fa-brands fa-whatsapp"></i></div>
    <div class="social telegram" onclick="shareTelegram()"><i class="fa-brands fa-telegram"></i></div>
  </div>

  <button onclick="download()">📸 Save</button>
  <button class="back" onclick="back2()">⬅ Edit</button>

  <div class="grid" id="grid"></div>
</div>

</div>

<script>

document.addEventListener("keydown",function(e){
  if(e.key==="Enter"){
    if(step1.classList.contains("active")) goStep2();
    else if(step2.classList.contains("active")) calculate();
  }
});

function updateTitle(step){
  mainTitle.innerText = step===3
    ? "⏳ Your Life Reality"
    : "😳 See how much of your life is already gone";
}

function showStep(n){
  document.querySelectorAll(".step").forEach(s=>s.classList.remove("active"));
  document.getElementById("step"+n).classList.add("active");

  document.querySelectorAll(".progress div").forEach(p=>p.classList.remove("active"));
  for(let i=1;i<=n;i++) document.getElementById("p"+i).classList.add("active");

  updateTitle(n);
}

function goStep2(){
  if(!dob.value) return alert("Enter DOB");
  showStep(2);
}

function back1(){showStep(1);}
function back2(){showStep(2);}

function calculate(){
  const dobDate=new Date(dob.value);
  const phone=parseFloat(document.getElementById("phone").value)||0;

  const today=new Date();
  const diff=today-dobDate;

  const days=Math.floor(diff/(1000*60*60*24));
  const weeks=Math.floor(days/7);
  const years=(days/365).toFixed(1);

  const life=75*365;
  const percent=((days/life)*100).toFixed(1);
  const left=Math.max(0,life-days);

  const phoneYears=((phone*365*75)/24/365).toFixed(1);

  let phase=years<18?"🎓 Learning":years<30?"🚀 Growth":years<50?"🏗 Building":"👑 Legacy";

  showStep(3);

  let phoneBlock="";
  if(phone>0){
    phoneBlock=`📱 You may lose <b>${phoneYears} years</b><br><br>`;
  }

  result.innerHTML=`
    🎬 Your life is <b>${percent}% completed</b><br><br>
    <span class="highlight">🌅 ${left.toLocaleString()} mornings left</span><br>
    <span class="danger">⏳ ${left.toLocaleString()} days left</span><br><br>
    ⚡ ${phase}<br><br>
    ${phoneBlock}
  `;

  let gridHTML="";
  for(let i=0;i<75*52;i++){
    gridHTML+=`<div class="box ${i<weeks?'filled':'empty'}"></div>`;
  }

  grid.innerHTML=gridHTML;

  document.querySelectorAll(".box").forEach((el,i)=>{
    setTimeout(()=>el.style.opacity="1",i);
  });
}

// DOWNLOAD
function download(){
  html2canvas(document.getElementById("capture")).then(canvas=>{
    let link=document.createElement("a");
    link.download="life.png";
    link.href=canvas.toDataURL();
    link.click();
  });
}

// SHARE
function shareWhatsApp(){
  window.open(`https://wa.me/?text=Check this 😳 ${location.href}`);
}
function shareTwitter(){
  window.open(`https://twitter.com/intent/tweet?url=${location.href}`);
}
function shareTelegram(){
  window.open(`https://t.me/share/url?url=${location.href}`);
}
function shareInsta(){
  alert("Save karke Instagram pe post karo 📸");
}

</script>

</body>
</html>
