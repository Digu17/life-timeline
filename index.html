<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Timeline Tool</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  padding: 20px;
  background: #f5f5f5;
}

h1 {
  margin-bottom: 10px;
}

input, button {
  padding: 10px;
  margin: 10px;
  font-size: 16px;
}

.card {
  background: white;
  padding: 15px;
  margin: 10px;
  border-radius: 10px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(50, 5px);
  gap: 2px;
  justify-content: center;
  margin-top: 20px;
}

.box {
  width: 5px;
  height: 5px;
}

.filled {
  background: black;
}

.empty {
  background: #ddd;
}

.progress {
  margin-top: 15px;
}
</style>
</head>

<body>

<h1>Your Life Timeline</h1>

<input type="date" id="dob">
<button onclick="calculate()">Calculate</button>

<div id="result"></div>

<div class="progress" id="progress"></div>

<div class="grid" id="grid"></div>

<script>
function calculate() {
  const dobValue = document.getElementById("dob").value;
  if (!dobValue) return alert("Enter DOB");

  const dob = new Date(dobValue);
  const today = new Date();

  const diffTime = today - dob;
  const days = Math.floor(diffTime / (1000 * 60 * 60 * 24));
  const weeks = Math.floor(days / 7);
  const years = (days / 365).toFixed(1);

  const lifeExpectancy = 75 * 365;
  const percent = ((days / lifeExpectancy) * 100).toFixed(1);

  document.getElementById("result").innerHTML = `
    <div class="card">Days: ${days}</div>
    <div class="card">Weeks: ${weeks}</div>
    <div class="card">Age: ${years} years</div>
  `;

  document.getElementById("progress").innerHTML =
    `You have lived ${percent}% of your life`;

  // Grid
  const totalWeeks = 75 * 52;
  let gridHTML = "";

  for (let i = 0; i < totalWeeks; i++) {
    if (i < weeks) {
      gridHTML += '<div class="box filled"></div>';
    } else {
      gridHTML += '<div class="box empty"></div>';
    }
  }

  document.getElementById("grid").innerHTML = gridHTML;
}
</script>

</body>
</html>
