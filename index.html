<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Timeline</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<!-- ✅ ADSENSE (APNA ID DAALNA) -->
<!-- <script async 
src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXX"
crossorigin="anonymous"></script> -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1619510997617162" crossorigin="anonymous"></script>


<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins';}

body{
  background:#020617;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.container{
  width:95%;
  max-width:420px;
  background:#0f172a;
  padding:20px;
  border-radius:20px;
  text-align:center;
}

.title{font-size:22px;font-weight:bold;}
.big{font-size:26px;font-weight:bold;}

.step{display:none;}
.step.active{display:block;}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-top:15px;
}

button{
  margin-top:12px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#6366f1;
  color:white;
  cursor:pointer;
}

.back{background:#334155;}

.ad-box{
  margin:15px 0;
  min-height:50px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(50,5px);
  gap:2px;
  margin-top:20px;
}
.box{width:5px;height:5px;opacity:0;}
.filled{background:#22c55e;}
.empty{background:#334155;}
</style>
</head>

<body>

<div class="container" id="capture">

<h2 class="title">😳 Your Life Timeline</h2>

<!-- ✅ TOP AD -->
<div class="ad-box">
  <ins class="adsbygoogle"
    style="display:block"
    data-ad-client="ca-pub-XXXXXXXX"
    data-ad-slot="1234567890"
    data-ad-format="auto"></ins>
</div>

<!-- STEP 1 -->
<div class="step active" id="step1">
  <input type="date" id="dob" min="1900-01-01" max="2099-12-31">
  <button onclick="goStep2()">Next</button>
</div>

<!-- STEP 2 -->
<div class="step" id="step2">
  <button onclick="calculate()">See My Life</button>
  <button class="back" onclick="back1()">⬅ Back</button>
</div>

<!-- STEP 3 -->
<div class="step" id="step3">

  <div id="result"></div>

  <!-- ✅ RESULT AD -->
  <div class="ad-box">
    <ins class="adsbygoogle"
      style="display:block"
      data-ad-client="ca-pub-XXXXXXXX"
      data-ad-slot="9876543210"
      data-ad-format="auto"></ins>
  </div>

  <button onclick="share()">📤 Share</button>
  <button class="back" onclick="back2()">⬅ Edit</button>

  <div class="grid" id="grid"></div>

</div>

</div>

<script>

function goStep2(){
  if(!dob.value) return alert("Enter DOB");
  step1.classList.remove("active");
  step2.classList.add("active");
}

function back1(){
  step2.classList.remove("active");
  step1.classList.add("active");
}

function back2(){
  step3.classList.remove("active");
  step2.classList.add("active");
}

function calculate(){
  const dobDate=new Date(dob.value);
  const today=new Date();
  const diff=today-dobDate;

  const days=Math.floor(diff/(1000*60*60*24));
  const weeks=Math.floor(days/7);

  const life=75*365;
  const percent=((days/life)*100).toFixed(1);
  const left=Math.max(0,life-days);

  step2.classList.remove("active");
  step3.classList.add("active");

  result.innerHTML=`
    <div class="big">😳 ${percent}% life gone</div><br>
    🌅 ${left.toLocaleString()} days left
  `;

  let gridHTML="";
  for(let i=0;i<75*52;i++){
    gridHTML+=`<div class="box ${i<weeks?'filled':'empty'}"></div>`;
  }
  grid.innerHTML=gridHTML;

  document.querySelectorAll(".box").forEach((el,i)=>{
    setTimeout(()=>el.style.opacity="1",i);
  });

  // ✅ LOAD ADS
  (adsbygoogle = window.adsbygoogle || []).push({});
}

function share(){
  html2canvas(document.getElementById("capture")).then(canvas=>{
    const img=canvas.toDataURL();

    const link=document.createElement("a");
    link.href=img;
    link.download="life.png";
    link.click();

    window.open(`https://wa.me/?text=😳 Check this ${location.href}`);
  });
}

</script>

</body>
</html>
