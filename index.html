<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Timeline Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: radial-gradient(circle at top, #1e293b, #020617);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  width: 95%;
  max-width: 500px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  padding: 25px;
  border-radius: 20px;
}

h1 { text-align: center; }
.sub { text-align: center; opacity: 0.7; font-size: 14px; }

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 12px;
}

button {
  margin-top: 12px;
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(45deg, #6366f1, #8b5cf6);
  color: white;
  cursor: pointer;
}

.cards {
  display: flex;
  justify-content: space-between;
  margin-top: 15px;
}

.card {
  width: 32%;
  background: rgba(255,255,255,0.08);
  padding: 10px;
  border-radius: 10px;
  text-align: center;
}

.progress-bar {
  margin-top: 15px;
  background: #334155;
  border-radius: 10px;
  overflow: hidden;
}

.progress-fill {
  height: 10px;
  width: 0%;
  background: linear-gradient(90deg, #22c55e, #4ade80);
  transition: 1s;
}

.text, .highlight, .extra {
  margin-top: 10px;
  text-align: center;
}

.highlight { color: #facc15; font-weight: bold; }
.danger { color: #ef4444; font-weight: bold; }

.grid {
  display: grid;
  grid-template-columns: repeat(50, 5px);
  gap: 2px;
  justify-content: center;
  margin-top: 20px;
}

.box {
  width: 5px;
  height: 5px;
  opacity: 0;
}

.filled { background: #22c55e; }
.empty { background: #334155; }

.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="container">
  <h1>⏳ Your Life Timeline</h1>
  <p class="sub">Reality check of your life</p>

  <!-- FORM (IMPORTANT) -->
  <form onsubmit="calculate(event)">
    
    <input type="date" id="dob" onchange="showPhone()">

    <!-- Hidden initially -->
    <input type="number" id="phone" class="hidden"
      min="0" max="24" step="0.5"
      placeholder="Daily phone usage (hours e.g. 4)">

    <button type="submit">See My Life</button>

  </form>

  <div class="cards" id="cards"></div>

  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div class="text" id="progressText"></div>
  <div class="highlight" id="highlight"></div>
  <div class="extra" id="extra"></div>

  <div class="grid" id="grid"></div>
</div>

<script>

// ✅ Show phone field after DOB
function showPhone() {
  document.getElementById("phone").classList.remove("hidden");
}

// ✅ Enter press + button both work
function calculate(e) {
  e.preventDefault();

  const dobValue = document.getElementById("dob").value;
  const phone = parseFloat(document.getElementById("phone").value) || 0;

  if (!dobValue) return alert("Enter DOB");

  const dob = new Date(dobValue);
  const today = new Date();

  const diffTime = today - dob;
  const days = Math.floor(diffTime / (1000 * 60 * 60 * 24));
  const weeks = Math.floor(days / 7);
  const years = (days / 365).toFixed(1);

  const lifeExpectancy = 75 * 365;
  const percent = ((days / lifeExpectancy) * 100).toFixed(1);
  const daysLeft = Math.max(0, Math.floor(lifeExpectancy - days));

  const phoneYears = ((phone * 365 * 75) / 24 / 365).toFixed(1);

  let phase = "";
  if (years < 18) phase = "🎓 Learning Phase";
  else if (years < 30) phase = "🚀 Growth Phase";
  else if (years < 50) phase = "🏗 Building Phase";
  else phase = "👑 Legacy Phase";

  document.getElementById("cards").innerHTML = `
    <div class="card">Days<br><b>${days}</b></div>
    <div class="card">Weeks<br><b>${weeks}</b></div>
    <div class="card">Age<br><b>${years}</b></div>
  `;

  document.getElementById("progressFill").style.width = percent + "%";

  document.getElementById("progressText").innerText =
    `🎬 Life completed: ${percent}%`;

  document.getElementById("highlight").innerText =
    `🌅 ${daysLeft.toLocaleString()} mornings left`;

  document.getElementById("extra").innerHTML = `
    ⏳ <span class="danger">${daysLeft.toLocaleString()} days left</span><br>
    ⚡ ${phase}<br>
    📱 ~${phoneYears} years lost on phone 😳
  `;

  const totalWeeks = 75 * 52;
  let gridHTML = "";

  for (let i = 0; i < totalWeeks; i++) {
    gridHTML += `<div class="box ${i < weeks ? 'filled' : 'empty'}"></div>`;
  }

  document.getElementById("grid").innerHTML = gridHTML;

  document.querySelectorAll(".box").forEach((el, i) => {
    setTimeout(() => {
      el.style.opacity = "1";
    }, i * 1);
  });
}

</script>

</body>
</html>
