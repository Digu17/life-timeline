<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Timeline</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: radial-gradient(circle at top, #1e293b, #020617);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  width: 95%;
  max-width: 420px;
  background: rgba(255,255,255,0.05);
  padding: 25px;
  border-radius: 20px;
  backdrop-filter: blur(20px);
  text-align: center;
}

/* Progress */
.progress {
  display: flex;
  gap: 5px;
  margin-bottom: 15px;
}

.progress div {
  flex: 1;
  height: 6px;
  background: #334155;
  border-radius: 10px;
}

.progress .active {
  background: linear-gradient(90deg, #22c55e, #4ade80);
}

/* Steps */
.step { display: none; }
.step.active { display: block; }

/* Inputs */
input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 15px;
}

/* Buttons */
button {
  margin-top: 12px;
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(45deg, #6366f1, #8b5cf6);
  color: white;
  cursor: pointer;
}

.back { background: #334155; }

/* Result */
.result {
  margin-top: 20px;
  line-height: 1.7;
  animation: fade 0.6s ease;
}

.highlight { color: #facc15; font-weight: bold; }
.danger { color: #ef4444; font-weight: bold; }

/* CTA */
.cta {
  margin-top: 15px;
  font-weight: bold;
  color: #22c55e;
}

/* Actions */
.actions {
  margin-top: 15px;
  display: flex;
  gap: 10px;
}

.actions button {
  flex: 1;
  background: #22c55e;
}

/* Grid */
.grid {
  display: grid;
  grid-template-columns: repeat(50, 5px);
  gap: 2px;
  justify-content: center;
  margin-top: 20px;
}

.box {
  width: 5px;
  height: 5px;
  opacity: 0;
}

.filled { background: #22c55e; }
.empty { background: #334155; }

@keyframes fade {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container" id="capture">

<h2>😳 See how much of your life is already gone</h2>
<p style="opacity:0.7;">Enter your birth date and see your life in weeks</p>

<!-- Progress -->
<div class="progress">
  <div id="p1" class="active"></div>
  <div id="p2"></div>
  <div id="p3"></div>
</div>

<!-- STEP 1 -->
<div class="step active" id="step1">
  <input type="date" id="dob">
  <button onclick="goStep2()">Next</button>
</div>

<!-- STEP 2 -->
<div class="step" id="step2">
  <input type="number" id="phone" placeholder="Phone usage (optional)">
  
  <button onclick="calculate()">See My Life</button>
  <button class="back" onclick="back1()">⬅ Back</button>
</div>

<!-- STEP 3 -->
<div class="step" id="step3">
  <div class="result" id="result"></div>

  <div class="cta">⚡ Start using your time wisely</div>

  <div class="actions">
    <button onclick="download()">📸 Save</button>
    <button onclick="share()">📤 Share</button>
  </div>

  <button class="back" onclick="back2()">⬅ Edit</button>

  <div class="grid" id="grid"></div>
</div>

</div>

<script>

// Enter support
document.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    if (step1.classList.contains("active")) goStep2();
    else if (step2.classList.contains("active")) calculate();
  }
});

function showStep(n) {
  document.querySelectorAll(".step").forEach(s => s.classList.remove("active"));
  document.getElementById("step"+n).classList.add("active");

  document.querySelectorAll(".progress div").forEach(p => p.classList.remove("active"));
  for (let i=1;i<=n;i++) document.getElementById("p"+i).classList.add("active");
}

function goStep2() {
  if (!dob.value) return alert("Enter DOB");
  showStep(2);
}

function back1(){ showStep(1); }
function back2(){ showStep(2); }

function calculate() {
  const dobValue = dob.value;
  const phone = parseFloat(document.getElementById("phone").value) || 0;

  const dobDate = new Date(dobValue);
  const today = new Date();

  const diff = today - dobDate;
  const days = Math.floor(diff / (1000*60*60*24));
  const weeks = Math.floor(days/7);
  const years = (days/365).toFixed(1);

  const life = 75*365;
  const percent = ((days/life)*100).toFixed(1);
  const left = Math.max(0, life-days);

  const phoneYears = ((phone*365*75)/24/365).toFixed(1);

  let phase="";
  if(years<18) phase="🎓 Learning";
  else if(years<30) phase="🚀 Growth";
  else if(years<50) phase="🏗 Building";
  else phase="👑 Legacy";

  showStep(3);

  document.getElementById("result").innerHTML = `
    🎬 Your life is <b>${percent}% completed</b><br>
    <span class="highlight">🌅 ${left.toLocaleString()} mornings left</span><br>
    <span class="danger">⏳ ${left.toLocaleString()} days left</span><br><br>
    
    📱 If you continue this habit:<br>
    😳 You will lose <b>${phoneYears} years</b> of your life<br><br>

    ⚡ You are in <b>${phase}</b> phase
  `;

  let gridHTML="";
  for(let i=0;i<75*52;i++){
    gridHTML+=`<div class="box ${i<weeks?'filled':'empty'}"></div>`;
  }

  grid.innerHTML=gridHTML;

  document.querySelectorAll(".box").forEach((el,i)=>{
    setTimeout(()=>el.style.opacity="1",i);
  });
}

// Save image
function download(){
  html2canvas(document.getElementById("capture")).then(canvas=>{
    const link=document.createElement("a");
    link.download="life.png";
    link.href=canvas.toDataURL();
    link.click();
  });
}

// Share
function share(){
  const text="Check your life timeline 👉 "+window.location.href;
  window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
}
</script>

</body>
</html>
