<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Timeline Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: radial-gradient(circle at top, #1e293b, #020617);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Container */
.container {
  width: 95%;
  max-width: 420px;
  background: rgba(255,255,255,0.05);
  padding: 25px;
  border-radius: 20px;
  backdrop-filter: blur(20px);
  text-align: center;
}

/* Progress Steps */
.progress-steps {
  display: flex;
  justify-content: space-between;
  margin-bottom: 15px;
}

.step-dot {
  width: 30%;
  height: 6px;
  background: #334155;
  border-radius: 10px;
}

.step-dot.active {
  background: linear-gradient(90deg, #22c55e, #4ade80);
}

/* Steps */
.step {
  display: none;
  animation: fade 0.4s ease;
}

.active {
  display: block;
}

/* Inputs */
input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 15px;
}

/* Buttons */
button {
  margin-top: 15px;
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(45deg, #6366f1, #8b5cf6);
  color: white;
  cursor: pointer;
}

.back-btn {
  background: #334155;
}

/* Result */
.result {
  margin-top: 20px;
  line-height: 1.6;
}

.highlight {
  color: #facc15;
  font-weight: bold;
}

.danger {
  color: #ef4444;
  font-weight: bold;
}

/* Grid */
.grid {
  display: grid;
  grid-template-columns: repeat(50, 5px);
  gap: 2px;
  justify-content: center;
  margin-top: 20px;
}

.box {
  width: 5px;
  height: 5px;
  opacity: 0;
}

.filled { background: #22c55e; }
.empty { background: #334155; }

/* Animation */
@keyframes fade {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container">

  <h2>⏳ Life Timeline</h2>
  <p style="opacity:0.7;">See your life in reality</p>

  <!-- Progress -->
  <div class="progress-steps">
    <div class="step-dot active" id="dot1"></div>
    <div class="step-dot" id="dot2"></div>
    <div class="step-dot" id="dot3"></div>
  </div>

  <!-- STEP 1 -->
  <div class="step active" id="step1">
    <input type="date" id="dob">
    <button onclick="goStep2()">Next</button>
  </div>

  <!-- STEP 2 -->
  <div class="step" id="step2">
    <input type="number" id="phone" placeholder="Phone usage (optional)">
    
    <button onclick="calculate()">See My Life</button>
    <button class="back-btn" onclick="backToStep1()">⬅ Back</button>
  </div>

  <!-- STEP 3 -->
  <div class="step" id="step3">
    <div class="result" id="result"></div>

    <button class="back-btn" onclick="backToStep2()">⬅ Edit</button>

    <div class="grid" id="grid"></div>
  </div>

</div>

<script>

// Step 1 → Step 2
function goStep2() {
  const dob = document.getElementById("dob").value;
  if (!dob) return alert("Enter DOB");

  document.getElementById("step1").classList.remove("active");
  document.getElementById("step2").classList.add("active");

  updateDots(2);
}

// Back to Step 1
function backToStep1() {
  document.getElementById("step2").classList.remove("active");
  document.getElementById("step1").classList.add("active");

  updateDots(1);
}

// Back to Step 2
function backToStep2() {
  document.getElementById("step3").classList.remove("active");
  document.getElementById("step2").classList.add("active");

  updateDots(2);
}

// Calculate
function calculate() {
  const dobValue = document.getElementById("dob").value;
  const phone = parseFloat(document.getElementById("phone").value) || 0;

  const dob = new Date(dobValue);
  const today = new Date();

  const diff = today - dob;
  const days = Math.floor(diff / (1000*60*60*24));
  const weeks = Math.floor(days / 7);
  const years = (days / 365).toFixed(1);

  const life = 75 * 365;
  const percent = ((days / life) * 100).toFixed(1);
  const left = Math.max(0, life - days);

  const phoneYears = ((phone * 365 * 75) / 24 / 365).toFixed(1);

  let phase = "";
  if (years < 18) phase = "🎓 Learning";
  else if (years < 30) phase = "🚀 Growth";
  else if (years < 50) phase = "🏗 Building";
  else phase = "👑 Legacy";

  document.getElementById("step2").classList.remove("active");
  document.getElementById("step3").classList.add("active");

  updateDots(3);

  document.getElementById("result").innerHTML = `
    🎬 Life: ${percent}% completed <br>
    <span class="highlight">🌅 ${left.toLocaleString()} mornings left</span><br>
    <span class="danger">⏳ ${left.toLocaleString()} days left</span><br>
    ⚡ ${phase} phase <br>
    📱 ${phoneYears} years lost on phone
  `;

  // Grid
  let gridHTML = "";
  for (let i = 0; i < 75*52; i++) {
    gridHTML += `<div class="box ${i < weeks ? 'filled' : 'empty'}"></div>`;
  }

  document.getElementById("grid").innerHTML = gridHTML;

  document.querySelectorAll(".box").forEach((el, i) => {
    setTimeout(() => el.style.opacity = "1", i);
  });
}

// Progress dots update
function updateDots(step) {
  document.querySelectorAll(".step-dot").forEach(d => d.classList.remove("active"));
  for (let i = 1; i <= step; i++) {
    document.getElementById("dot" + i).classList.add("active");
  }
}

</script>

</body>
</html>
