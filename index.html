<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Timeline Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  text-align: center;
  padding: 20px;
}

/* Container */
.container {
  max-width: 500px;
  margin: auto;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 0 30px rgba(0,0,0,0.3);
  animation: fadeIn 1s ease;
}

h1 {
  font-size: 24px;
  margin-bottom: 15px;
}

/* Input */
input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
  font-size: 16px;
}

/* Button */
button {
  margin-top: 15px;
  padding: 12px;
  width: 100%;
  border: none;
  border-radius: 10px;
  background: linear-gradient(45deg, #6366f1, #8b5cf6);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px #8b5cf6;
}

/* Cards */
.cards {
  display: flex;
  justify-content: space-between;
  margin-top: 20px;
}

.card {
  background: rgba(255,255,255,0.08);
  padding: 10px;
  border-radius: 10px;
  width: 30%;
  font-size: 14px;
  animation: slideUp 0.5s ease;
}

/* Progress */
.progress-bar {
  margin-top: 20px;
  background: #334155;
  border-radius: 10px;
  overflow: hidden;
}

.progress-fill {
  height: 10px;
  background: linear-gradient(90deg, #22c55e, #4ade80);
  width: 0%;
  transition: width 1s ease;
}

/* Grid */
.grid {
  display: grid;
  grid-template-columns: repeat(50, 5px);
  gap: 2px;
  justify-content: center;
  margin-top: 20px;
}

.box {
  width: 5px;
  height: 5px;
  border-radius: 1px;
}

.filled {
  background: #22c55e;
}

.empty {
  background: #334155;
}

/* Animation */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px);}
  to { opacity: 1; transform: translateY(0);}
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px);}
  to { opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container">
  <h1>⏳ Your Life Timeline</h1>

  <input type="date" id="dob">
  <button onclick="calculate()">Calculate</button>

  <div class="cards" id="cards"></div>

  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <p id="progressText" style="margin-top:10px;"></p>

  <div class="grid" id="grid"></div>
</div>

<script>
function calculate() {
  const dobValue = document.getElementById("dob").value;
  if (!dobValue) return alert("Enter DOB");

  const dob = new Date(dobValue);
  const today = new Date();

  const diffTime = today - dob;
  const days = Math.floor(diffTime / (1000 * 60 * 60 * 24));
  const weeks = Math.floor(days / 7);
  const years = (days / 365).toFixed(1);

  const lifeExpectancy = 75 * 365;
  const percent = ((days / lifeExpectancy) * 100).toFixed(1);

  // Cards
  document.getElementById("cards").innerHTML = `
    <div class="card">Days<br><b>${days}</b></div>
    <div class="card">Weeks<br><b>${weeks}</b></div>
    <div class="card">Age<br><b>${years}</b></div>
  `;

  // Progress
  document.getElementById("progressFill").style.width = percent + "%";
  document.getElementById("progressText").innerText =
    `You have lived ${percent}% of your life`;

  // Grid
  const totalWeeks = 75 * 52;
  let gridHTML = "";

  for (let i = 0; i < totalWeeks; i++) {
    gridHTML += `<div class="box ${i < weeks ? 'filled' : 'empty'}"></div>`;
  }

  document.getElementById("grid").innerHTML = gridHTML;
}
</script>

</body>
</html>
